<body>
 <header>
        <div class="logo">
            <span class="dot"></span>
            <div>
               <h1>Contact Me</h1>
            </div>
        </div>
        <nav>
		    <a href="index.html">Home Page</a>
            <a href="Resume.html">CV </a>
            <a href="Projects.Html">Projects</a>
            <a href="Contact.Html">Contact</a>
        </nav>
    </header>
	

    <div class="background-blob"></div>
    
    <div class="contact-container">
        <div class="contact-info">
            <h2>Let's connect</h2>
            <p>Have a project in mind or just want to say hi? Feel free to reach out!</p>
            
            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <span>Azariuso@Outlook.com</span>
            </div>
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Northampton, United Kingdom</span>
            </div>

            <div class="social-links">
                <a href="https://www.linkedin.com/in/azariuso/"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://github.com/AzariusO/AzariusO"><i class="fab fa-github"></i></a>
            </div>
        </div>

        <form method="post" action="mailto:Azariuso@Outlook.com" class="contact-form">
            <div class="input-group">
                <input type="text" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <textarea placeholder="Your Message" rows="5" required></textarea>
            </div>
            <button type="submit" value="Send Email" class="submit-btn">Send Message</button>
        </form>
    </div>
</body>
</html>
